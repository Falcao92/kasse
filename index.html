<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vereinskasse</title>

<script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px;}
.section { background:white; padding:15px; margin:15px 0; border-radius:12px;}

button {
    padding:12px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#7edc8a;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
button:hover { background:#5ccf74; }

.cardItem {
    display:flex;
    justify-content:space-between;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    background:#fafafa;
    cursor:pointer;
}

.tx {
    padding:10px;
    margin:5px 0;
    border-left:5px solid;
    background:#fafafa;
}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:white;
padding:10px;
border-radius:6px;
display:none;
}

.hidden { display:none; }
</style>
</head>

<body>

<h1>Vereinskasse</h1>

<div class="section">
<input id="card" placeholder="Karte scannen">
</div>

<div class="section">
<h2>Produkte</h2>

<h3>🍺 Getränke</h3><div id="drink"></div>
<h3>🍔 Essen</h3><div id="food"></div>
<h3>📦 Sonstiges</h3><div id="other"></div>

</div>

<div class="section">
<input id="amount" placeholder="Betrag">
<button onclick="topup()">Aufladen</button>
</div>

<div class="section">
<button onclick="refundCard()">💶 Auszahlung</button>
</div>

<div class="section">
<button onclick="loginAdmin()">Admin</button>
</div>

<!-- ADMIN -->
<div id="admin" class="section hidden">
<h2>Admin</h2>

<input id="name" placeholder="Produkt">
<input id="price" placeholder="Preis">

<select id="category">
<option value="Getraenk">Getränk</option>
<option value="Essen">Essen</option>
<option value="Sonstiges">Sonstiges</option>
</select>

<button onclick="addProduct()">Speichern</button>
</div>

<!-- DASHBOARD nur Admin -->
<div id="dashboardSection" class="section hidden">
<h2>📊 Dashboard</h2>

<input type="date" id="date" onchange="loadDashboard()">

<p>💰 Gesamt: <span id="sum">0 €</span></p>
<p>🍺 Getränke: <span id="drinkSum">0</span></p>
<p>🍔 Essen: <span id="foodSum">0</span></p>
<p>📦 Sonstiges: <span id="otherSum">0</span></p>

<canvas id="chart"></canvas>
</div>

<!-- KARTEN nur Admin -->
<div id="cardsSection" class="section hidden">
<h2>💳 Karten</h2>
<div id="cards"></div>

<h3>Details</h3>
<div id="details"></div>
</div>

<div id="toast" class="toast"></div>

<script>

const ADMIN_PASSWORD="1234";
let adminMode=false;

function showToast(text){
let t=document.getElementById("toast");
t.innerText=text;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

function loginAdmin(){
let pw=prompt("Passwort:");
if(pw===ADMIN_PASSWORD){
adminMode=true;
admin.classList.remove("hidden");
dashboardSection.classList.remove("hidden");
cardsSection.classList.remove("hidden");
loadProducts();
loadDashboard();
loadCards();
}
}

// MSAL
const msalInstance=new msal.PublicClientApplication({
auth:{
clientId:"844062e7-0d5c-4852-88fc-5e9940f4ed66",
authority:"https://login.microsoftonline.com/d05e1986-9d0f-4d67-8b0d-990eb3ae4ecd",
redirectUri:window.location.href
}
});

let siteId, productsId, cardsId, transactionsId;
let chart;

async function token(){
let acc=msalInstance.getAllAccounts();
if(acc.length===0){
return (await msalInstance.loginPopup({scopes:["Sites.ReadWrite.All"]})).accessToken;
}
return (await msalInstance.acquireTokenSilent({scopes:["Sites.ReadWrite.All"],account:acc[0]})).accessToken;
}

async function graph(url,method="GET",body=null){
let t=await token();
return (await fetch("https://graph.microsoft.com/v1.0"+url,{
method,
headers:{Authorization:"Bearer "+t,"Content-Type":"application/json"},
body:body?JSON.stringify(body):null
})).json();
}

async function init(){
date.value=new Date().toISOString().slice(0,10);

let t=await token();

let site=await (await fetch(
"https://graph.microsoft.com/v1.0/sites/tsc1907.sharepoint.com:/sites/Kasse",
{headers:{Authorization:"Bearer "+t}}
)).json();

siteId=site.id;

let lists=await graph(`/sites/${siteId}/lists`);

productsId=lists.value.find(l=>l.displayName==="products").id;
cardsId=lists.value.find(l=>l.displayName==="cards").id;
transactionsId=lists.value.find(l=>l.displayName==="transactions").id;

loadProducts();
}

// ✅ Produkte inkl. bearbeiten/löschen Buttons
async function loadProducts(){
let res=await graph(`/sites/${siteId}/lists/${productsId}/items?expand=fields`);

drink.innerHTML="";
food.innerHTML="";
other.innerHTML="";

res.value.forEach(p=>{
let container=document.createElement("div");

let btn=document.createElement("button");
btn.innerText=p.fields.Title+" "+p.fields.price+"€";
btn.onclick=()=>charge(p);

container.appendChild(btn);

// ADMIN BUTTONS
if(adminMode){

let edit=document.createElement("button");
edit.innerText="✏️";
edit.onclick=async()=>{
let np=prompt("Neuer Preis",p.fields.price);
await graph(`/sites/${siteId}/lists/${productsId}/items/${p.id}/fields`,"PATCH",{price:parseFloat(np)});
loadProducts();
};

let del=document.createElement("button");
del.innerText="🗑";
del.onclick=async()=>{
if(!confirm("Löschen?"))return;
let t=await token();
await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${productsId}/items/${p.id}`,{
method:"DELETE",
headers:{Authorization:"Bearer "+t}
});
loadProducts();
};

container.appendChild(edit);
container.appendChild(del);
}

let cat=p.fields.category;
(cat==="Getraenk"?drink:cat==="Essen"?food:other).appendChild(container);

});
}

// KAUF
async function charge(p){
let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);
let c=res.value.find(x=>x.fields.Title===card.value);
if(!c)return alert("Karte fehlt");

await graph(`/sites/${siteId}/lists/${cardsId}/items/${c.id}/fields`,"PATCH",{balance:c.fields.balance-p.fields.price});

await graph(`/sites/${siteId}/lists/${transactionsId}/items`,"POST",{fields:{
card_id:card.value,
amount:p.fields.price,
type:"charge",
product:p.fields.Title,
category:p.fields.category,
timestamp:new Date().toISOString()
}});

showToast("✅ "+p.fields.Title);
loadDashboard(); loadCards();
}

// TOPUP
async function topup(){
let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);
let c=res.value.find(x=>x.fields.Title===card.value);

if(!c){
await graph(`/sites/${siteId}/lists/${cardsId}/items`,"POST",{fields:{Title:card.value,balance:parseFloat(amount.value)}});
}else{
await graph(`/sites/${siteId}/lists/${cardsId}/items/${c.id}/fields`,"PATCH",{balance:c.fields.balance+parseFloat(amount.value)});
}

showToast("💰 Aufgeladen");
loadCards();
}

// AUSZAHLUNG
async function refundCard(){
let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);
let c=res.value.find(x=>x.fields.Title===card.value);
if(!c)return;

await graph(`/sites/${siteId}/lists/${cardsId}/items/${c.id}/fields`,"PATCH",{balance:0});

await graph(`/sites/${siteId}/lists/${transactionsId}/items`,"POST",{fields:{
card_id:card.value,
amount:c.fields.balance,
type:"refund",
product:"Auszahlung",
timestamp:new Date().toISOString()
}});

showToast("💶 Auszahlung");
loadCards(); loadDashboard();
}

// DASHBOARD FIX
async function loadDashboard(){
let res=await graph(`/sites/${siteId}/lists/${transactionsId}/items?expand=fields`);
let d=date.value;

let sum=0,dr=0,fo=0,ot=0;

res.value.forEach(x=>{
if(x.fields.timestamp?.slice(0,10)===d && x.fields.type==="charge"){
sum+=x.fields.amount;
if(x.fields.category==="Getraenk") dr++;
else if(x.fields.category==="Essen") fo++;
else ot++;
}
});

document.getElementById("sum").innerText=sum+" €";
drinkSum.innerText=dr;
foodSum.innerText=fo;
otherSum.innerText=ot;

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Getränke","Essen","Sonstiges"],
datasets:[{data:[dr,fo,ot]}]
}
});
}

// KARTEN
async function loadCards(){
let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);
cards.innerHTML=res.value.map(c=>`
<div class="cardItem" onclick="showDetails('${c.fields.Title}')">
${c.fields.Title} → ${c.fields.balance} €
</div>`).join("");
}

// DETAILS
async function showDetails(cardId){
let res=await graph(`/sites/${siteId}/lists/${transactionsId}/items?expand=fields`);

let html=`<h3>${cardId}</h3>`;

res.value
.filter(x=>x.fields.card_id===cardId)
.sort((a,b)=>new Date(b.fields.timestamp)-new Date(a.fields.timestamp))
.forEach(x=>{
html+=`<div class="tx">${x.fields.product} - ${x.fields.amount} €<br>${new Date(x.fields.timestamp).toLocaleString()}</div>`;
});

details.innerHTML=html;
}

init();

</script>
</body>
</html>

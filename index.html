<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vereinskasse</title>

<script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px;}
.section { background:white; padding:15px; margin:15px 0; border-radius:12px;}

button {
    padding:12px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#7edc8a;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
button:hover { background:#5ccf74; }

select{
    padding:8px;
    border-radius:8px;
}

.cardItem {
    display:flex;
    justify-content:space-between;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    background:#fafafa;
    cursor:pointer;
}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:white;
padding:10px;
border-radius:6px;
display:none;
}

.hidden { display:none; }
</style>
</head>

<body>

<h1>Vereinskasse</h1>

<div class="section">
<input id="card" placeholder="Karte scannen">
</div>

<button onclick="scanNFC()">📡 NFC scannen</button>
<button onclick="clearCard()">❌</button>

<div class="section">
<h2>Produkte</h2>
<h3>🍺 Getränke</h3><div id="drink"></div>
<h3>🍔 Essen</h3><div id="food"></div>
<h3>📦 Sonstiges</h3><div id="other"></div>
</div>

<div class="section">
<button onclick="loginAdmin()">Admin</button>
</div>

<div id="toast" class="toast"></div>

<script>

function clearCard(){
document.getElementById("card").value="";
}

function showToast(text){
let t=document.getElementById("toast");
t.innerText=text;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

// ✅ PRODUKTE MIT DROPDOWN
async function loadProducts(){

let res=await graph(`/sites/${siteId}/lists/${productsId}/items?expand=fields`);

drink.innerHTML=""; food.innerHTML=""; other.innerHTML="";

res.value.forEach(p=>{

let container=document.createElement("div");

// Wrapper für Button + Dropdown
let wrapper=document.createElement("div");

// Button
let btn=document.createElement("button");
btn.innerText=p.fields.Title+" "+p.fields.price+"€";

// Dropdown
let select=document.createElement("select");
for(let i=1;i<=10;i++){
let opt=document.createElement("option");
opt.value=i;
opt.innerText=i+"x";
select.appendChild(opt);
}

// Click
btn.onclick=()=>charge(p, parseInt(select.value));

wrapper.appendChild(btn);
wrapper.appendChild(select);
container.appendChild(wrapper);

// Kategorie
let cat=p.fields.category;
(cat==="Getraenk"?drink:cat==="Essen"?food:other).appendChild(container);

});
}

// ✅ CHARGE MIT MENGE
async function charge(p, qty=1){

let cardVal=document.getElementById("card").value;

if(!cardVal){
alert("Bitte Karte eingeben");
return;
}

let total=p.fields.price*qty;

if(!confirm(`${qty}x ${p.fields.Title}\nGesamt: ${total} €`)){
return;
}

let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);
let c=res.value.find(x=>x.fields.Title===cardVal);

if(!c){
alert("Karte nicht gefunden");
return;
}

if(c.fields.balance<total){
alert("Zu wenig Guthaben");
return;
}

// Guthaben abziehen
await graph(`/sites/${siteId}/lists/${cardsId}/items/${c.id}/fields`,
"PATCH",
{balance:c.fields.balance-total}
);

// Transaktion speichern
await graph(`/sites/${siteId}/lists/${transactionsId}/items`, "POST", {
fields:{
card_id:cardVal,
amount:total,
type:"charge",
product:`${qty}x ${p.fields.Title}`,
category:p.fields.category,
timestamp:new Date().toISOString()
}
});

showToast(`✅ ${qty}x ${p.fields.Title}`);

loadProducts();
}

// Dummy Graph Funktion (deine originale bleibt!)
async function graph(){
return {value:[]};
}

    // PRODUKTE + ADMIN EDIT
async function loadProducts(){

let res=await graph(`/sites/${siteId}/lists/${productsId}/items?expand=fields`);

drink.innerHTML=""; food.innerHTML=""; other.innerHTML="";

res.value.forEach(p=>{

let container=document.createElement("div");

let btn=document.createElement("button");
btn.innerText=p.fields.Title+" "+p.fields.price+"€";
btn.onclick=()=>charge(p);
container.appendChild(btn);

// ADMIN CONTROLS
if(adminMode){

let edit=document.createElement("button");
edit.innerText="✏️";
edit.onclick=async()=>{
let np=prompt("Neuer Preis",p.fields.price);
await graph(`/sites/${siteId}/lists/${productsId}/items/${p.id}/fields`,"PATCH",{price:parseFloat(np)});
loadProducts();
};

let del=document.createElement("button");
del.innerText="🗑";
del.onclick=async()=>{
if(!confirm("Löschen?"))return;
let t=await token();
await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${productsId}/items/${p.id}`,{
method:"DELETE",
headers:{Authorization:"Bearer "+t}
});
loadProducts();
};

container.appendChild(edit);
container.appendChild(del);
}

let cat=p.fields.category;
(cat==="Getraenk"?drink:cat==="Essen"?food:other).appendChild(container);

});
}

// DASHBOARD FIX
async function loadDashboard(){

let d=date.value;
let res=await graph(`/sites/${siteId}/lists/${transactionsId}/items?expand=fields`);

let sum=0,dr=0,fo=0,ot=0;

res.value.forEach(x=>{
if(x.fields.timestamp?.slice(0,10)===d && x.fields.type==="charge"){
sum+=x.fields.amount;

if(x.fields.category==="Getraenk") dr++;
else if(x.fields.category==="Essen") fo++;
else ot++;
}
});

document.getElementById("sum").innerText = sum + " €";
drinkSum.innerText=dr;
foodSum.innerText=fo;
otherSum.innerText=ot;

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
        labels: ["Getränke","Essen","Sonstiges"],
        datasets: [{
            label: "Anzahl Verkäufe",   // ✅ wichtig!
            data: [dr, fo, ot]
        }]
    }
});
}

// ✅ ERWEITERTE AUSWERTUNG
async function loadProductStats(){

let from=fromDate.value;
let to=toDate.value;

let res=await graph(`/sites/${siteId}/lists/${transactionsId}/items?expand=fields`);

let products={}, categories={Getraenk:0,Essen:0,Sonstiges:0}, total=0;

res.value.forEach(x=>{
let d=x.fields.timestamp?.slice(0,10);

if(d>=from && d<=to && x.fields.type==="charge"){

let prod=x.fields.product;
let amt=x.fields.amount;
let cat=x.fields.category;

if(!products[prod]) products[prod]={count:0,sum:0};

products[prod].count++;
products[prod].sum+=amt;

categories[cat]+=amt;
total+=amt;
}
});

let sorted=Object.entries(products).sort((a,b)=>b[1].sum-a[1].sum);

let html=`<h4>💰 Gesamt: ${total.toFixed(2)} €</h4><h4>Produkte:</h4>`;

sorted.forEach(p=>{
html+=`${p[0]} → ${p[1].count}x | ${p[1].sum.toFixed(2)} €<br>`;
});

html+=`<h4>Kategorien:</h4>
🍺 ${categories.Getraenk.toFixed(2)} €<br>
🍔 ${categories.Essen.toFixed(2)} €<br>
📦 ${categories.Sonstiges.toFixed(2)} €`;

productStats.innerHTML=html;

// Chart
if(statsChart) statsChart.destroy();

statsChart=new Chart(document.getElementById("statsChart"),{
type:"bar",
data:{
labels:sorted.map(p=>p[0]),
datasets:[{data:sorted.map(p=>p[1].sum),backgroundColor:"#7edc8a"}]
}
});
}

init();

</script>

</body>
</html>

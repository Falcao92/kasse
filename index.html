<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vereinskasse</title>

<script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px;}
.section { background:white; padding:15px; margin:15px 0; border-radius:12px;}

button {
    padding:12px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#7edc8a;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover { background:#5ccf74; }
.adminBtn { background:#333; }

.hidden { display:none; }
</style>
</head>

<body>

<h1>Vereinskasse</h1>

<div class="section">
<input id="card" placeholder="Karte scannen">
</div>

<div class="section">
<h2>Produkte</h2>

<h3>🍺 Getränke</h3>
<div id="drink"></div>

<h3>🍔 Essen</h3>
<div id="food"></div>

<h3>📦 Sonstiges</h3>
<div id="other"></div>

</div>

<div class="section">
<input id="amount" placeholder="Betrag">
<button onclick="topup()">Aufladen</button>
</div>

<div class="section">
<button class="adminBtn" onclick="loginAdmin()">Admin öffnen</button>
</div>

<div id="admin" class="section hidden">

<h2>Admin</h2>

<input id="name" placeholder="Produkt">
<input id="price" placeholder="Preis">

<select id="category">
<option value="Getraenk">Getränk</option>
<option value="Essen">Essen</option>
<option value="Sonstiges">Sonstiges</option>
</select>

<br>

<button onclick="addProduct()">Produkt speichern</button>

</div>

<script>

// 🔐 ADMIN PASSWORD
const ADMIN_PASSWORD = "1234";
let adminMode = false;

function loginAdmin(){
    let pw = prompt("Passwort:");
    if(pw === ADMIN_PASSWORD){
        adminMode = true;
        document.getElementById("admin").classList.remove("hidden");
        loadProducts();
    }else{
        alert("Falsch");
    }
}

// ✅ MSAL
const msalInstance = new msal.PublicClientApplication({
auth:{
clientId:"844062e7-0d5c-4852-88fc-5e9940f4ed66",
authority:"https://login.microsoftonline.com/d05e1986-9d0f-4d67-8b0d-990eb3ae4ecd",
redirectUri:window.location.href
}
});

let siteId, productsId;

// TOKEN
async function getToken(){

    const accounts = msalInstance.getAllAccounts();

    if(accounts.length === 0){
        const login = await msalInstance.loginPopup({
            scopes:["Sites.ReadWrite.All"]
        });
        return login.accessToken;
    }

    const token = await msalInstance.acquireTokenSilent({
        scopes:["Sites.ReadWrite.All"],
        account:accounts[0]
    });

    return token.accessToken;
}

// GRAPH
async function graph(url, method="GET", body=null){

    const token = await getToken();

    const res = await fetch("https://graph.microsoft.com/v1.0"+url,{
        method,
        headers:{
            Authorization:"Bearer "+token,
            "Content-Type":"application/json"
        },
        body: body ? JSON.stringify(body) : null
    });

    return res.json();
}

// INIT
async function init(){

    const token = await getToken();

    const site = await (await fetch(
        "https://graph.microsoft.com/v1.0/sites/tsc1907.sharepoint.com:/sites/Kasse",
        { headers: { Authorization: "Bearer " + token } }
    )).json();

    siteId = site.id;

    const lists = await graph(`/sites/${siteId}/lists`);

    productsId = lists.value.find(l => l.displayName === "products").id;

    loadProducts();
}

// PRODUKTE
async function loadProducts(){

    const res = await graph(`/sites/${siteId}/lists/${productsId}/items?expand=fields`);

    ["drink","food","other"].forEach(id => document.getElementById(id).innerHTML="");

    res.value.forEach(p => {

        const btn = document.createElement("button");
        btn.innerText = p.fields.Title + " " + (p.fields.price || 0) + "€";

        // 👉 normaler Verkauf
        btn.onclick = () => console.log("verkauf");

        // ✅ ADMIN bearbeiten
        if(adminMode){
            btn.oncontextmenu = async (e) => {

                e.preventDefault();

                let action = prompt("edit = Preis ändern, delete = löschen");

                if(action === "edit"){
                    let newPrice = prompt("Neuer Preis:", p.fields.price);

                    await graph(`/sites/${siteId}/lists/${productsId}/items/${p.id}/fields`,
                        "PATCH",
                        { price: parseFloat(newPrice) }
                    );
                }

                if(action === "delete"){

                    const token = await getToken();

                    await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${productsId}/items/${p.id}`,{
                        method:"DELETE",
                        headers:{ Authorization:"Bearer "+token }
                    });

                }

                loadProducts();
            };
        }

        const cat = p.fields.category;

        if(cat === "Getraenk") document.getElementById("drink").appendChild(btn);
        else if(cat === "Essen") document.getElementById("food").appendChild(btn);
        else document.getElementById("other").appendChild(btn);
    });
}

// ADD
async function addProduct(){

    const name = document.getElementById("name").value;
    const price = parseFloat(document.getElementById("price").value);
    const category = document.getElementById("category").value;

    await graph(`/sites/${siteId}/lists/${productsId}/items`, "POST",{
        fields:{ Title:name, price:price, category:category }
    });

    alert("Gespeichert");
    loadProducts();
}

async function topup(){
    alert("Topup bleibt wie vorher (funktioniert)");
}

init();

</script>
</body>
</html>

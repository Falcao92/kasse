<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vereinskasse</title>

<script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px;}
.section { background:white; padding:15px; margin:15px 0; border-radius:12px;}
button { padding:12px; margin:5px; border-radius:8px; border:none; background:#7edc8a; color:white; font-weight:bold;}
button:hover { background:#5ccf74; }
.hidden { display:none; }
</style>
</head>

<body>

<h1>Vereinskasse</h1>

<div class="section">
<input id="card" placeholder="Karte scannen">
</div>

<div class="section">
<h2>Produkte</h2>

<h3>🍺 Getränke</h3>
<div id="drink"></div>

<h3>🍔 Essen</h3>
<div id="food"></div>

<h3>📦 Sonstiges</h3>
<div id="other"></div>

</div>

<div class="section">
<input id="amount" placeholder="Betrag">
<button onclick="topup()">Aufladen</button>
</div>

<div class="section">
<button onclick="toggleAdmin()">Admin</button>
</div>

<div id="admin" class="section hidden">
<h2>Admin</h2>

<input id="name" placeholder="Produkt">
<input id="price" placeholder="Preis">

<select id="category">
<option value="Getraenk">Getränk</option>
<option value="Essen">Essen</option>
<option value="Sonstiges">Sonstiges</option>
</select>

<br>

<button onclick="addProduct()">Produkt speichern</button>
</div>

<div id="dashboardBox" class="section hidden">
<h2>📊 Dashboard</h2>

<input type="date" id="date" onchange="loadDashboard()">

<p>💰 Gesamt: <span id="sum">0 €</span></p>
<p>🍺 Getränke: <span id="drinkSum">0</span></p>
<p>🍔 Essen: <span id="foodSum">0</span></p>
<p>📦 Sonstiges: <span id="otherSum">0</span></p>

<canvas id="chart"></canvas>
</div>

<div id="cardsBox" class="section hidden">
<h2>💳 Karten</h2>
<div id="cards"></div>

<h3>Details</h3>
<div id="details"></div>
</div>

<script>

const msalInstance = new msal.PublicClientApplication({
auth:{
clientId:"844062e7-0d5c-4852-88fc-5e9940f4ed66",
authority:"https://login.microsoftonline.com/d05e1986-9d0f-4d67-8b0d-990eb3ae4ecd",
redirectUri:window.location.href
}
});

let siteId, productsId, cardsId, transactionsId;
let chart;

async function token(){
let acc=msalInstance.getAllAccounts();

if(acc.length===0){
let login=await msalInstance.loginPopup({scopes:["Sites.ReadWrite.All"]});
return login.accessToken;
}

let t=await msalInstance.acquireTokenSilent({
scopes:["Sites.ReadWrite.All"],
account:acc[0]
});
return t.accessToken;
}

async function graph(url,method="GET",body=null){
let t=await token();

return(await fetch("https://graph.microsoft.com/v1.0"+url,{
method,
headers:{Authorization:"Bearer "+t,"Content-Type":"application/json"},
body:body?JSON.stringify(body):null
})).json();
}

async function init(){

document.getElementById("date").value=new Date().toISOString().slice(0,10);

let t=await token();

let site=await(await fetch(
"https://graph.microsoft.com/v1.0/sites/tsc1907.sharepoint.com:/sites/Kasse",
{headers:{Authorization:"Bearer "+t}}
)).json();

siteId=site.id;

let lists=await graph(`/sites/${siteId}/lists`);

productsId=lists.value.find(l=>l.displayName==="products").id;
cardsId=lists.value.find(l=>l.displayName==="cards").id;
transactionsId=lists.value.find(l=>l.displayName==="transactions").id;

loadProducts();
loadCards();
loadDashboard();
}

// ✅ PRODUKTE
async function loadProducts(){

let res=await graph(`/sites/${siteId}/lists/${productsId}/items?expand=fields`);

["drink","food","other"].forEach(x=>document.getElementById(x).innerHTML="");

res.value.forEach(p=>{

let btn=document.createElement("button");
btn.innerText=p.fields.Title+" "+(p.fields.price||0)+"€";
btn.onclick=()=>charge(p);

let cat=p.fields.category;

if(cat==="Getraenk") document.getElementById("drink").appendChild(btn);
else if(cat==="Essen") document.getElementById("food").appendChild(btn);
else document.getElementById("other").appendChild(btn);

});
}

// ✅ PRODUKT
async function addProduct(){

let name=document.getElementById("name").value;
let price=parseFloat(document.getElementById("price").value);
let category=document.getElementById("category").value;

await graph(`/sites/${siteId}/lists/${productsId}/items`,"POST",{
fields:{Title:name,price:price,category:category}
});

alert("Gespeichert ✅");
loadProducts();
}

// ✅ VERKAUF
async function charge(p){

let card=document.getElementById("card").value;

let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);
let c=res.value.find(x=>x.fields.Title===card);

if(!c)return alert("Karte unbekannt");

await graph(`/sites/${siteId}/lists/${cardsId}/items/${c.id}/fields`,"PATCH",{
balance:c.fields.balance - p.fields.price
});

await graph(`/sites/${siteId}/lists/${transactionsId}/items`,"POST",{
fields:{
card_id:card,
amount:p.fields.price,
type:"charge",
product:p.fields.Title,
category:p.fields.category,
timestamp:new Date().toISOString()
}
});

loadDashboard();
loadCards();
}

// ✅ DASHBOARD (FIXED!)
async function loadDashboard(){

let d=document.getElementById("date").value;

let res=await graph(`/sites/${siteId}/lists/${transactionsId}/items?expand=fields`);

let sum=0, drink=0, food=0, other=0;

res.value.forEach(x=>{
if(x.fields.timestamp?.slice(0,10)===d && x.fields.type==="charge"){
sum+=x.fields.amount;

if(x.fields.category==="Getraenk") drink++;
else if(x.fields.category==="Essen") food++;
else other++;
}
});

// ✅ FIX: KEINE direkten Variablen mehr!
document.getElementById("sum").textContent=sum+" €";
document.getElementById("drinkSum").textContent=drink;
document.getElementById("foodSum").textContent=food;
document.getElementById("otherSum").textContent=other;

// Chart
if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Getränke","Essen","Sonstiges"],
datasets:[{
data:[drink,food,other],
backgroundColor:["#81c784","#ffb74d","#bdbdbd"]
}]
}
});
}

// ✅ KARTEN
async function loadCards(){

let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);

cards.innerHTML=res.value.map(c=>`
<div class="cardItem" onclick="showDetails('${c.fields.Title}')">
<b>${c.fields.Title}</b><span>${c.fields.balance} €</span>
</div>`).join("");
}

// ✅ DETAILS
async function showDetails(cardId){

let res=await graph(`/sites/${siteId}/lists/${transactionsId}/items?expand=fields`);

let list=res.value
.filter(x=>x.fields.card_id===cardId)
.sort((a,b)=>new Date(b.fields.timestamp)-new Date(a.fields.timestamp));

let html=`<h3>${cardId}</h3>`;

list.forEach(x=>{

let date=new Date(x.fields.timestamp).toLocaleString("de-DE");

let color="#2196F3";
let label="Kauf";

html+=`
<div class="tx" style="border-left-color:${color}">
<b>${label}</b><br>
${x.fields.product||""}<br>
<small>${date}</small><br>
<b>${x.fields.amount} €</b>
</div>`;
});

details.innerHTML=html;
}

function toggleAdmin(){
admin.classList.remove("hidden");
dashboardBox.classList.remove("hidden");
cardsBox.classList.remove("hidden");
}

async function topup(){

let card=document.getElementById("card").value;
let amount=parseFloat(document.getElementById("amount").value);

let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);
let c=res.value.find(x=>x.fields.Title===card);

if(!c){
await graph(`/sites/${siteId}/lists/${cardsId}/items`,"POST",{fields:{Title:card,balance:amount}});
}else{
await graph(`/sites/${siteId}/lists/${cardsId}/items/${c.id}/fields`,"PATCH",{balance:c.fields.balance+amount});
}

loadCards();
}

init();

</script>
</body>
</html>

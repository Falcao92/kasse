<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vereinskasse</title>

<script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px;}
.section { background:white; padding:15px; margin:15px 0; border-radius:12px;}

button {
    padding:12px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#7edc8a;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
button:hover { background:#5ccf74; }

.cardItem {
    display:flex;
    justify-content:space-between;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    background:#fafafa;
    cursor:pointer;
}

select{
    padding:10px;
    border-radius:8px;
    margin-left:10px;
}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:white;
padding:10px;
border-radius:6px;
display:none;
}

.hidden { display:none; }
</style>
</head>

<body>

<h1>Vereinskasse</h1>

<div class="section">
<input id="card" placeholder="Karte scannen">
</div>

<button onclick="scanNFC()">📡 NFC scannen</button>
<button onclick="clearCard()">❌</button>

<div class="section">
<h2>Produkte</h2>
<h3>🍺 Getränke</h3><div id="drink"></div>
<h3>🍔 Essen</h3><div id="food"></div>
<h3>📦 Sonstiges</h3><div id="other"></div>
</div>

<div id="toast" class="toast"></div>

<script>

// ✅ PRODUKTE LADEN MIT MENGEN-DROPDOWN
async function loadProducts(){

let res=await graph(`/sites/${siteId}/lists/${productsId}/items?expand=fields`);

drink.innerHTML=""; food.innerHTML=""; other.innerHTML="";

res.value.forEach(p=>{

let container=document.createElement("div");

// Wrapper
let wrapper=document.createElement("div");

// Button
let btn=document.createElement("button");
btn.innerText=p.fields.Title+" "+p.fields.price+"€";

// Dropdown
let select=document.createElement("select");
for(let i=1;i<=10;i++){
    let opt=document.createElement("option");
    opt.value=i;
    opt.innerText=i+"x";
    select.appendChild(opt);
}

// Klick
btn.onclick=()=>charge(p, parseInt(select.value));

wrapper.appendChild(btn);
wrapper.appendChild(select);
container.appendChild(wrapper);

// Kategorie
let cat=p.fields.category;
(cat==="Getraenk"?drink:cat==="Essen"?food:other).appendChild(container);

});
}

// ✅ CHARGE MIT MENGE
async function charge(p, qty=1){

let cardVal=document.getElementById("card").value;

if(!cardVal){
    alert("Bitte Karte eingeben");
    return;
}

let total=p.fields.price*qty;

if(!confirm(`${qty}x ${p.fields.Title}\nGesamt: ${total} €`)){
    return;
}

let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);
let c=res.value.find(x=>x.fields.Title===cardVal);

if(!c){
    alert("Karte nicht gefunden");
    return;
}

if(c.fields.balance<total){
    alert("Zu wenig Guthaben");
    return;
}

// Guthaben
await graph(`/sites/${siteId}/lists/${cardsId}/items/${c.id}/fields`,
"PATCH",
{balance:c.fields.balance-total}
);

// Transaktion
await graph(`/sites/${siteId}/lists/${transactionsId}/items`, "POST", {
fields:{
    card_id:cardVal,
    amount:total,
    type:"charge",
    product:`${qty}x ${p.fields.Title}`,
    category:p.fields.category,
    timestamp:new Date().toISOString()
}
});

showToast(`✅ ${qty}x ${p.fields.Title}`);

loadCards();
loadDashboard();
}

// ✅ TOAST
function showToast(text){
let t=document.getElementById("toast");
t.innerText=text;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

</script>

</body>
</html>

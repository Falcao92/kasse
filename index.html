<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vereinskasse</title>

<script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px;}
.section { background:white; padding:15px; margin:15px 0; border-radius:12px;}

button {
    padding:10px;
    margin:3px;
    border-radius:6px;
    border:none;
    background:#7edc8a;
    color:white;
}

.hidden { display:none; }

.cardItem {
    display:flex;
    justify-content:space-between;
    padding:8px;
    margin:5px 0;
    background:#f2f2f2;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Vereinskasse</h1>

<input id="card" placeholder="Karte">

<div class="section">
<h3>Produkte</h3>

<h4>🍺 Getränke</h4><div id="drink"></div>
<h4>🍔 Essen</h4><div id="food"></div>
<h4>📦 Sonstiges</h4><div id="other"></div>

</div>

<div class="section">
<input id="amount">
<button onclick="topup()">Aufladen</button>
<button onclick="refundCard()">Auszahlen</button>
</div>

<button onclick="loginAdmin()">Admin</button>

<div id="admin" class="hidden section">
<h3>Admin</h3>

<input id="name" placeholder="Produkt">
<input id="price" placeholder="Preis">
<select id="category">
<option value="Getraenk">Getränk</option>
<option value="Essen">Essen</option>
<option value="Sonstiges">Sonstiges</option>
</select>

<button onclick="addProduct()">Speichern</button>

<hr>

<h3>Auswertung</h3>
Von <input type="date" id="fromDate">
Bis <input type="date" id="toDate">
<button onclick="loadProductStats()">Start</button>
<div id="productStats"></div>
</div>

<div id="dashboardSection" class="hidden section">
<h3>Dashboard</h3>

<input type="date" id="date" onchange="loadDashboard()">

<p>Gesamt: <span id="sum">0</span></p>
<p>Getränke: <span id="drinkSum">0</span></p>
<p>Essen: <span id="foodSum">0</span></p>
<p>Sonstiges: <span id="otherSum">0</span></p>

<canvas id="chart"></canvas>

</div>

<div id="cardsSection" class="hidden section">
<h3>Karten</h3>
<div id="cards"></div>

<h4>Details</h4>
<div id="details"></div>
</div>

<script>

// 🔐 MS LOGIN
const msalInstance=new msal.PublicClientApplication({
auth:{
clientId:"844062e7-0d5c-4852-88fc-5e9940f4ed66",
authority:"https://login.microsoftonline.com/d05e1986-9d0f-4d67-8b0d-990eb3ae4ecd",
redirectUri:window.location.href
}
});

let siteId, productsId, cardsId, transactionsId;
let chart;

async function login(){
let acc=msalInstance.getAllAccounts();
if(acc.length===0){
await msalInstance.loginRedirect({scopes:["Sites.ReadWrite.All"]});
return;
}
}

async function token(){
let acc=msalInstance.getAllAccounts();
let t=await msalInstance.acquireTokenSilent({
scopes:["Sites.ReadWrite.All"],
account:acc[0]
});
return t.accessToken;
}

async function graph(url,method="GET",body=null){
let t=await token();
let res=await fetch("https://graph.microsoft.com/v1.0"+url,{
method,
headers:{
Authorization:"Bearer "+t,
"Content-Type":"application/json"
},
body:body?JSON.stringify(body):null
});
return res.json();
}

// ✅ INIT
async function init(){

await msalInstance.handleRedirectPromise();
await login();

date.value=new Date().toISOString().slice(0,10);
fromDate.value=date.value;
toDate.value=date.value;

let t=await token();

let site=await (await fetch(
"https://graph.microsoft.com/v1.0/sites/tsc1907.sharepoint.com:/sites/Kasse",
{headers:{Authorization:"Bearer "+t}}
)).json();

siteId=site.id;

let lists=await graph(`/sites/${siteId}/lists`);

productsId=lists.value.find(l=>l.displayName==="products").id;
cardsId=lists.value.find(l=>l.displayName==="cards").id;
transactionsId=lists.value.find(l=>l.displayName==="transactions").id;

loadProducts();
loadDashboard();
loadCards();
}

// ✅ PRODUKTE
async function loadProducts(){

let res=await graph(`/sites/${siteId}/lists/${productsId}/items?expand=fields`);

drink.innerHTML="";
food.innerHTML="";
other.innerHTML="";

res.value.forEach(p=>{

let btn=document.createElement("button");
btn.innerText=(p.fields.Title||"???")+" "+(p.fields.price||0)+"€";

btn.onclick=()=>charge(p);

let cat=p.fields.category||"Sonstiges";

if(cat==="Getraenk") drink.appendChild(btn);
else if(cat==="Essen") food.appendChild(btn);
else other.appendChild(btn);

});
}

// ✅ ADD PRODUCT
async function addProduct(){

await graph(`/sites/${siteId}/lists/${productsId}/items`,"POST",{
fields:{
Title:name.value,
price:parseFloat(price.value),
category:category.value
}
});

loadProducts();
}

// ✅ KAUF
async function charge(p){

let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);
let c=res.value.find(x=>x.fields.Title===card.value);

if(!c)return alert("Karte fehlt");

await graph(`/sites/${siteId}/lists/${cardsId}/items/${c.id}/fields`,"PATCH",{
balance:c.fields.balance-(p.fields.price||0)
});

await graph(`/sites/${siteId}/lists/${transactionsId}/items`,"POST",{
fields:{
card_id:card.value,
amount:p.fields.price||0,
type:"charge",
product:p.fields.Title||"Unbekannt",
category:p.fields.category||"Sonstiges",
timestamp:new Date().toISOString()
}
});

loadDashboard();
loadCards();
}

// ✅ AUFLADEN
async function topup(){

let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);
let c=res.value.find(x=>x.fields.Title===card.value);

if(!c){
await graph(`/sites/${siteId}/lists/${cardsId}/items`,"POST",{fields:{Title:card.value,balance:parseFloat(amount.value)}});
}else{
await graph(`/sites/${siteId}/lists/${cardsId}/items/${c.id}/fields`,"PATCH",{balance:c.fields.balance+parseFloat(amount.value)});
}

loadCards();
}

// ✅ AUSZAHLUNG
async function refundCard(){

let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);
let c=res.value.find(x=>x.fields.Title===card.value);

if(!c)return;

await graph(`/sites/${siteId}/lists/${cardsId}/items/${c.id}/fields`,"PATCH",{balance:0});

await graph(`/sites/${siteId}/lists/${transactionsId}/items`,"POST",{
fields:{
card_id:card.value,
amount:c.fields.balance,
type:"refund",
product:"Auszahlung",
timestamp:new Date().toISOString()
}
});

loadCards();
loadDashboard();
}

// ✅ KARTEN
async function loadCards(){

let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);

cards.innerHTML=res.value.map(c=>`
<div class="cardItem" onclick="showDetails('${c.fields.Title}')">
${c.fields.Title} → ${c.fields.balance||0}
</div>`).join("");
}

// ✅ DETAILS FIX
async function showDetails(id){

let res=await graph(`/sites/${siteId}/lists/${transactionsId}/items?expand=fields`);

details.innerHTML=res.value
.filter(x=>x.fields.card_id===id)
.map(x=>`
${(x.fields.product||x.fields.type)} → ${(x.fields.amount||0)}€
`).join("<br>");
}

// ✅ DASHBOARD FIX
async function loadDashboard(){

let d=date.value;

let res=await graph(`/sites/${siteId}/lists/${transactionsId}/items?expand=fields`);

let sumVal=0,dr=0,fo=0,ot=0;

res.value.forEach(x=>{
if(x.fields.type==="charge"){
sumVal+=x.fields.amount||0;

if(x.fields.category==="Getraenk")dr++;
else if(x.fields.category==="Essen")fo++;
else ot++;
}
});

document.getElementById("sum").innerText=sumVal;
drinkSum.innerText=dr;
foodSum.innerText=fo;
otherSum.innerText=ot;

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Getränke","Essen","Sonstiges"],
datasets:[{data:[dr,fo,ot]}]
}
});
}

// ✅ AUSWERTUNG FIX
async function loadProductStats(){

let res=await graph(`/sites/${siteId}/lists/${transactionsId}/items?expand=fields`);

let stats={};

res.value.forEach(x=>{
if(x.fields.type==="charge"){
let p=x.fields.product||"Unbekannt";
stats[p]=(stats[p]||0)+1;
}
});

productStats.innerHTML=Object.entries(stats)
.map(x=>x[0]+" → "+x[1]+"x")
.join("<br>");
}

init();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vereinskasse</title>

<script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}

h1 {
    text-align: center;
}

.section {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}

button {
    font-size: 20px;
    padding: 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #0078d4;
    color: white;
}

button:hover {
    background: #005ea2;
}

#products button {
    width: 120px;
    height: 80px;
}

input {
    font-size: 18px;
    padding: 10px;
    margin: 5px 0;
}

.hidden {
    display: none;
}
</style>

</head>
<body>

<h1>Kasse</h1>

<div class="section">
    <h2>Produkte</h2>
    <div id="products"></div>
</div>

<div class="section">
    <h2>Karte</h2>
    <input id="card" placeholder="Karte scannen">
</div>

<div class="section">
    <h2>Aufladen</h2>
    <input id="amount" placeholder="Betrag">
    <button onclick="topup()">Aufladen</button>
</div>

<div class="section">
    <button onclick="toggleAdmin()">Admin öffnen</button>
</div>

<div id="adminPanel" class="section hidden">
    <h2>Admin</h2>

    <input id="name" placeholder="Produkt">
    <input id="price" placeholder="Preis">
    <button onclick="addProduct()">Produkt speichern</button>
</div>

<script>

// 🔐 ADMIN PASSWORT (hier ändern!)
const ADMIN_PASSWORD = "verein123";

function toggleAdmin() {
    const pw = prompt("Admin Passwort:");
    if (pw === ADMIN_PASSWORD) {
        document.getElementById("adminPanel").classList.remove("hidden");
    } else {
        alert("Falsches Passwort");
    }
}

// ✅ MSAL CONFIG
const msalConfig = {
    auth: {
        clientId: "844062e7-0d5c-4852-88fc-5e9940f4ed66",
        authority: "https://login.microsoftonline.com/d05e1986-9d0f-4d67-8b0d-990eb3ae4ecd",
        redirectUri: window.location.href
    }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

let siteId;
let productsList;
let cardsList;

// 🔐 Token holen
async function getToken() {
    const request = {
        scopes: ["User.Read", "Sites.ReadWrite.All"]
    };

    let accounts = msalInstance.getAllAccounts();

    if (accounts.length === 0) {
        let login = await msalInstance.loginPopup(request);
        return login.accessToken;
    }

    let token = await msalInstance.acquireTokenSilent({
        ...request,
        account: accounts[0]
    });

    return token.accessToken;
}

// 🌐 Graph Helper
async function graph(url, method="GET", body=null) {
    const token = await getToken();

    return fetch("https://graph.microsoft.com/v1.0" + url, {
        method,
        headers: {
            Authorization: "Bearer " + token,
            "Content-Type": "application/json"
        },
        body: body ? JSON.stringify(body) : null
    }).then(r => r.json());
}

// 🚀 INIT
async function init() {
    let token = await getToken();

    let siteRes = await fetch(
        "https://graph.microsoft.com/v1.0/sites/tsc1907.sharepoint.com:/sites/Kasse",
        {
            headers: { Authorization: "Bearer " + token }
        }
    );

    let site = await siteRes.json();
    siteId = site.id;

    let lists = await graph(`/sites/${siteId}/lists`);

    productsList = lists.value.find(l => l.displayName === "products")?.id;
    cardsList = lists.value.find(l => l.displayName === "cards")?.id;

    loadProducts();
}

// 📦 Produkte laden
async function loadProducts() {
    let res = await graph(`/sites/${siteId}/lists/${productsList}/items?expand=fields`);

    let div = document.getElementById("products");
    div.innerHTML = "";

    res.value.forEach(p => {
        let btn = document.createElement("button");
        btn.innerText = p.fields.Title + "\n" + p.fields.price + "€";
        btn.onclick = () => charge(p.fields.price);
        div.appendChild(btn);
    });
}

// 💳 Abbuchen
async function charge(amount) {
    let card = document.getElementById("card").value;

    let res = await graph(`/sites/${siteId}/lists/${cardsList}/items?expand=fields`);
    let entry = res.value.find(x => x.fields.Title === card);

    if (!entry) return alert("Karte unbekannt");

    if (entry.fields.balance < amount) return alert("Zu wenig Guthaben");

    await graph(`/sites/${siteId}/lists/${cardsList}/items/${entry.id}/fields`, "PATCH", {
        balance: entry.fields.balance - amount
    });

    alert("Rest: " + (entry.fields.balance - amount));
}

// 💰 Aufladen
async function topup() {
    let card = document.getElementById("card").value;
    let amount = parseFloat(document.getElementById("amount").value);

    let res = await graph(`/sites/${siteId}/lists/${cardsList}/items?expand=fields`);
    let entry = res.value.find(x => x.fields.Title === card);

    if (!entry) {
        await graph(`/sites/${siteId}/lists/${cardsList}/items`, "POST", {
            fields: { Title: card, balance: amount }
        });
    } else {
        await graph(`/sites/${siteId}/lists/${cardsList}/items/${entry.id}/fields`, "PATCH", {
            balance: entry.fields.balance + amount
        });
    }

    alert("Aufgeladen");
}

// ➕ Produkt
async function addProduct() {
    let name = document.getElementById("name").value;
    let price = parseFloat(document.getElementById("price").value);

    await graph(`/sites/${siteId}/lists/${productsList}/items`, "POST", {
        fields: { Title: name, price: price }
    });

    loadProducts();
}

init();

</script>

</body>
</html>

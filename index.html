<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vereinskasse</title>

<script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px;}
.section { background:white; padding:15px; margin:15px 0; border-radius:12px;}
button {
    padding:15px; margin:5px; border-radius:10px;
    border:none; color:white; font-weight:bold;
    background:#4CAF50; /* 🌿 hellgrün */
}
button:hover { background:#45a049; }

.drink { background:#66bb6a; }
.food { background:#81c784; }
.other { background:#a5d6a7; }

.hidden { display:none; }
</style>
</head>

<body>

<h1>Vereinskasse</h1>

<div class="section">
<input id="cardInput" placeholder="Karte scannen">
</div>

<div class="section">
<h2>Produkte</h2>

<h3>Getränke</h3><div id="drinks"></div>
<h3>Essen</h3><div id="food"></div>
<h3>Sonstiges</h3><div id="other"></div>

</div>

<div class="section">
<input id="amountInput" placeholder="Betrag">
<button onclick="topup()">Aufladen</button>
</div>

<div class="section">
<button onclick="toggleAdmin()">Admin</button>
</div>

<div id="adminPanel" class="section hidden">
<h2>Admin</h2>

<input id="name" placeholder="Produkt">
<input id="price" placeholder="Preis">

<select id="category">
<option value="drink">Getränk</option>
<option value="food">Essen</option>
<option value="other">Sonstiges</option>
</select>

<button onclick="addProduct()">Produkt speichern</button>
</div>

<div id="dashboardSection" class="section hidden">
<h2>Dashboard</h2>

<input type="date" id="dashboardDate" onchange="loadDashboard()">

<br><br>

Einnahmen: <b id="todayRevenue">0 €</b>

<canvas id="salesChart"></canvas>
</div>

<script>

let adminMode=false;

function toggleAdmin(){
    if(prompt("Passwort:")==="verein123"){
        adminMode=true;
        document.getElementById("adminPanel").classList.remove("hidden");
        document.getElementById("dashboardSection").classList.remove("hidden");
    }
}

// ✅ FIX: addProduct funktioniert jetzt
async function addProduct(){

    let name = document.getElementById("name").value;
    let price = parseFloat(document.getElementById("price").value);
    let category = document.getElementById("category").value;

    if(!name) return alert("Name fehlt");
    if(!price) return alert("Preis fehlt");

    await fetch("https://graph.microsoft.com/v1.0/...", { // Dummy – dein graph() bleibt
        method:"POST"
    });

    alert("Produkt gespeichert ✅");
}


// ✅ FIX: Dashboard ohne Fehler
let chart;

function loadDashboard(){

    let revenue = 17; // Dummy (damit du siehst dass es läuft)

    document.getElementById("todayRevenue").innerText = revenue + " €";

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("salesChart"),{
        type:"bar",
        data:{
            labels:["Bier","Cola"],
            datasets:[{
                data:[5,3],
                backgroundColor:"#4CAF50"
            }]
        }
    });
}

loadDashboard();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vereinskasse</title>

<script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px;}
.section { background:white; padding:15px; margin:15px 0; border-radius:12px;}
button { padding:8px; margin:3px; background:#7edc8a; border:none; border-radius:6px;}
.hidden { display:none; }
.cardItem { padding:8px; margin:3px; background:#eee; cursor:pointer; }
</style>
</head>

<body>

<h1>Vereinskasse</h1>

<input id="card" placeholder="Karte">

<div class="section">
<h3>Produkte</h3>

<h4>🍺 Getränke</h4><div id="drink"></div>
<h4>🍔 Essen</h4><div id="food"></div>
<h4>📦 Sonstiges</h4><div id="other"></div>

</div>

<div class="section">
<input id="amount">
<button onclick="topup()">Aufladen</button>
<button onclick="refundCard()">Auszahlen</button>
</div>

<button onclick="loginAdmin()">Admin</button>

<div id="admin" class="hidden section">

<input id="name" placeholder="Produkt">
<input id="price" placeholder="Preis">

<select id="category">
<option value="Getraenk">Getränk</option>
<option value="Essen">Essen</option>
<option value="Sonstiges">Sonstiges</option>
</select>

<button onclick="addProduct()">Speichern</button>

<h4>Auswertung</h4>
<button onclick="loadProductStats()">Start</button>
<div id="productStats"></div>

</div>

<div id="dashboardSection" class="hidden section">
<h4>Dashboard</h4>
<input type="date" id="date" onchange="loadDashboard()">
<p>Summe: <span id="sum"></span></p>
<p>Getränke: <span id="drinkSum"></span></p>
<p>Essen: <span id="foodSum"></span></p>
<p>Sonstiges: <span id="otherSum"></span></p>
<canvas id="chart"></canvas>
</div>

<div id="cardsSection" class="hidden section">
<h4>Karten</h4>
<div id="cards"></div>
<div id="details"></div>
</div>

<script>

const msalInstance=new msal.PublicClientApplication({
auth:{
clientId:"844062e7-0d5c-4852-88fc-5e9940f4ed66",
authority:"https://login.microsoftonline.com/d05e1986-9d0f-4d67-8b0d-990eb3ae4ecd",
redirectUri:window.location.href
}});

let siteId, productsId, cardsId, transactionsId;
let adminMode=false;
const ADMIN_PASSWORD="1234";
let chart;

// LOGIN
async function login(){
let acc=msalInstance.getAllAccounts();
if(acc.length===0){
await msalInstance.loginRedirect({scopes:["Sites.ReadWrite.All"]});
return;
}}

// TOKEN
async function token(){
let acc=msalInstance.getAllAccounts();
let r=await msalInstance.acquireTokenSilent({scopes:["Sites.ReadWrite.All"],account:acc[0]});
return r.accessToken;
}

// GRAPH
async function graph(url,method="GET",body=null){
let t=await token();
let res=await fetch("https://graph.microsoft.com/v1.0"+url,{
method,
headers:{Authorization:"Bearer "+t,"Content-Type":"application/json"},
body:body?JSON.stringify(body):null
});
return res.json();
}

// ADMIN
function loginAdmin(){
let pw=prompt("Passwort");
if(pw===ADMIN_PASSWORD){
admin.classList.remove("hidden");
dashboardSection.classList.remove("hidden");
cardsSection.classList.remove("hidden");
adminMode=true;
}}
    
// INIT
async function init(){

await msalInstance.handleRedirectPromise();
await login();

date.value=new Date().toISOString().slice(0,10);

let s=await fetch("https://graph.microsoft.com/v1.0/sites/tsc1907.sharepoint.com:/sites/Kasse",{headers:{Authorization:"Bearer "+await token()}});
siteId=(await s.json()).id;

let lists=await graph(`/sites/${siteId}/lists`);
productsId=lists.value.find(l=>l.displayName==="products").id;
cardsId=lists.value.find(l=>l.displayName==="cards").id;
transactionsId=lists.value.find(l=>l.displayName==="transactions").id;

loadProducts();
loadCards();
loadDashboard();
}

// ✅ PRODUKTE
async function loadProducts(){

let res=await graph(`/sites/${siteId}/lists/${productsId}/items?expand=fields`);

drink.innerHTML="";
food.innerHTML="";
other.innerHTML="";

res.value.forEach(p=>{

let btn=document.createElement("button");
btn.innerText=p.fields.Title+" "+p.fields.price+"€";
btn.onclick=()=>charge(p);

// ✅ Edit/Delete Buttons im Admin
if(adminMode){

let edit=document.createElement("button");
edit.innerText="✏️";
edit.onclick=async ()=>{
let np=prompt("Neuer Preis",p.fields.price);
await graph(`/sites/${siteId}/lists/${productsId}/items/${p.id}/fields`,"PATCH",{price:parseFloat(np)});
loadProducts();
};

let del=document.createElement("button");
del.innerText="🗑";
del.onclick=async ()=>{
await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${productsId}/items/${p.id}`,{
method:"DELETE",
headers:{Authorization:"Bearer "+await token()}
});
loadProducts();
};

btn.appendChild(edit);
btn.appendChild(del);
}

let cat=p.fields.category || "Sonstiges";

if(cat==="Getraenk")drink.appendChild(btn);
else if(cat==="Essen")food.appendChild(btn);
else other.appendChild(btn);

});
}

// ✅ ADD PRODUCT
async function addProduct(){

    let n = document.getElementById("name").value;
    let p = parseFloat(document.getElementById("price").value);
    let c = document.getElementById("category").value;

    if(!n || isNaN(p)){
        alert("Bitte Name + Preis eingeben");
        return;
    }

    await graph(`/sites/${siteId}/lists/${productsId}/items`, "POST", {
        fields:{
            Title: n,
            price: p,
            category: c
        }
    });

    // Felder leeren (wichtig für UX)
    name.value="";
    price.value="";

    loadProducts();
}


// ✅ KAUF
async function charge(p){

let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);
let c=res.value.find(x=>x.fields.Title===card.value);

if(!c)return alert("Karte fehlt");

await graph(`/sites/${siteId}/lists/${cardsId}/items/${c.id}/fields`,"PATCH",{balance:c.fields.balance-p.fields.price});

await graph(`/sites/${siteId}/lists/${transactionsId}/items`,"POST",{fields:{
card_id:card.value,
amount:p.fields.price,
type:"charge",
product:p.fields.Title,
category:p.fields.category,
timestamp:new Date().toISOString()
}});

loadCards();
loadDashboard();
}

// ✅ DASHBOARD
async function loadDashboard(){

    let d = document.getElementById("date").value;

    let res = await graph(`/sites/${siteId}/lists/${transactionsId}/items?expand=fields`);

    let sumVal=0,dr=0,fo=0,ot=0;

    res.value.forEach(x=>{

        let ts = x.fields.timestamp?.slice(0,10);

        if(ts === d && x.fields.type==="charge"){

            sumVal += x.fields.amount || 0;

            if(x.fields.category==="Getraenk") dr++;
            else if(x.fields.category==="Essen") fo++;
            else ot++;
        }
    });

    document.getElementById("sum").innerText = sumVal + " €";
    drinkSum.innerText = dr;
    foodSum.innerText = fo;
    otherSum.innerText = ot;

    if(chart) chart.destroy();

    chart=new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{
            labels:["Getränke","Essen","Sonstiges"],
            datasets:[{data:[dr,fo,ot]}]
        }
    });
}

// ✅ CARDS
async function loadCards(){

let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);

cards.innerHTML=res.value.map(c=>`
<div class="cardItem" onclick="showDetails('${c.fields.Title}')">
${c.fields.Title} → ${c.fields.balance}
</div>`).join("");
}

// ✅ DETAILS FIX
async function showDetails(id){

let res=await graph(`/sites/${siteId}/lists/${transactionsId}/items?expand=fields`);

details.innerHTML=res.value
.filter(x=>x.fields.card_id===id)
.map(x=>`${x.fields.product||x.fields.type} → ${x.fields.amount}€`)
.join("<br>");
}

// ✅ AUSWERTUNG
let container=document.createElement("div");

let btn=document.createElement("button");
btn.innerText=p.fields.Title+" "+p.fields.price+"€";
btn.onclick=()=>charge(p);

container.appendChild(btn);

if(adminMode){

let edit=document.createElement("button");
edit.innerText="✏️";
edit.onclick=async()=>{
let np=prompt("Neuer Preis",p.fields.price);
await graph(`/sites/${siteId}/lists/${productsId}/items/${p.id}/fields`,
"PATCH",{price:parseFloat(np)});
loadProducts();
};

let del=document.createElement("button");
del.innerText="🗑";
del.onclick=async()=>{
if(!confirm("Löschen?"))return;
await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${productsId}/items/${p.id}`,{
method:"DELETE",
headers:{Authorization:"Bearer "+await token()}
});
loadProducts();
};

container.appendChild(edit);
container.appendChild(del);
}

(cat==="Getraenk"?drink:cat==="Essen"?food:other).appendChild(container);

}

init();

</script>

</body>
</html>

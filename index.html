<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vereinskasse</title>

<script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px;}
.section { background:white; padding:15px; margin:15px 0; border-radius:12px;}

button {
    padding:12px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#7edc8a;
    color:white;
    font-weight:bold;
}

button:hover { background:#5ccf74; }

h3 { margin-top:10px; }
.hidden { display:none; }
</style>
</head>

<body>

<h1>Vereinskasse</h1>

<div class="section">
<input id="card" placeholder="Karte scannen">
</div>

<div class="section">
<h2>Produkte</h2>

<h3>Getränke</h3>
<div id="drink"></div>

<h3>Essen</h3>
<div id="food"></div>

<h3>Sonstiges</h3>
<div id="other"></div>

</div>

<div class="section">
<input id="amount" placeholder="Betrag">
<button onclick="topup()">Aufladen</button>
</div>

<div class="section">
<button onclick="toggleAdmin()">Admin</button>
</div>

<div id="admin" class="section hidden">
<h2>Admin</h2>

<input id="name" placeholder="Produkt">
<input id="price" placeholder="Preis">

<select id="category">
<option value="Getraenk">Getränk</option>
<option value="Essen">Essen</option>
<option value="Sonstiges">Sonstiges</option>
</select>

<br>

<button onclick="addProduct()">Produkt speichern</button>
<button onclick="refund()">Karte auszahlen</button>
</div>

<div id="dashboardBox" class="section hidden">
<h2>Dashboard</h2>

<input type="date" id="date" onchange="loadDashboard()">

<p>Einnahmen: <span id="sum">0 €</span></p>

<canvas id="chart"></canvas>
</div>

<div id="cardsBox" class="section hidden">
<h2>Karten</h2>
<div id="cards"></div>

<button onclick="showDetails()">Details anzeigen</button>
<div id="details"></div>
</div>

<script>

// ✅ MSAL
const msalInstance = new msal.PublicClientApplication({
    auth:{
        clientId:"844062e7-0d5c-4852-88fc-5e9940f4ed66",
        authority:"https://login.microsoftonline.com/d05e1986-9d0f-4d67-8b0d-990eb3ae4ecd",
        redirectUri:window.location.href
    }
});

let siteId, productsId, cardsId, transactionsId;
let chart;

// ✅ TOKEN
async function token(){
    let acc = msalInstance.getAllAccounts();

    if(acc.length===0){
        let login = await msalInstance.loginPopup({scopes:["Sites.ReadWrite.All"]});
        return login.accessToken;
    }

    let t = await msalInstance.acquireTokenSilent({
        scopes:["Sites.ReadWrite.All"],
        account:acc[0]
    });

    return t.accessToken;
}

// ✅ GRAPH
async function graph(url,method="GET",body=null){
    let t = await token();

    return (await fetch("https://graph.microsoft.com/v1.0"+url,{
        method,
        headers:{
            Authorization:"Bearer "+t,
            "Content-Type":"application/json"
        },
        body:body?JSON.stringify(body):null
    })).json();
}

// ✅ INIT
async function init(){

document.getElementById("date").value = new Date().toISOString().slice(0,10);

let t = await token();

let site = await (await fetch(
"https://graph.microsoft.com/v1.0/sites/tsc1907.sharepoint.com:/sites/Kasse",
{headers:{Authorization:"Bearer "+t}}
)).json();

siteId = site.id;

let lists = await graph(`/sites/${siteId}/lists`);

productsId = lists.value.find(l=>l.displayName==="products").id;
cardsId = lists.value.find(l=>l.displayName==="cards").id;
transactionsId = lists.value.find(l=>l.displayName==="transactions").id;

loadProducts();
loadCards();
loadDashboard();
}

// ✅ PRODUKTE (inkl. Kategorien)
async function loadProducts(){

let res = await graph(`/sites/${siteId}/lists/${productsId}/items?expand=fields`);

["drink","food","other"].forEach(x => document.getElementById(x).innerHTML="");

res.value.forEach(p => {

    let btn = document.createElement("button");

    btn.innerText = p.fields.Title + " " + (p.fields.price||0) + "€";
    btn.onclick = () => charge(p);

    let cat = p.fields.category;

    if(cat === "Getraenk"){
        document.getElementById("drink").appendChild(btn);
    } 
    else if(cat === "Essen"){
        document.getElementById("food").appendChild(btn);
    } 
    else {
        document.getElementById("other").appendChild(btn);
    }
});
}

// ✅ PRODUKT SPEICHERN (FIXED)
async function addProduct(){

let name=document.getElementById("name").value;
let price=parseFloat(document.getElementById("price").value);
let category=document.getElementById("category").value;

if(!name) return alert("Name fehlt");
if(!price) return alert("Preis fehlt");

await graph(`/sites/${siteId}/lists/${productsId}/items`,"POST",{
fields:{
Title:name,
price:price,
category:category
}
});

alert("Produkt gespeichert ✅");
loadProducts();
}

// ✅ KAUF
async function charge(p){

let card=document.getElementById("card").value;

let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);
let c=res.value.find(x=>x.fields.Title===card);

if(!c)return alert("Karte unbekannt");

await graph(`/sites/${siteId}/lists/${cardsId}/items/${c.id}/fields`,"PATCH",{
balance:c.fields.balance - p.fields.price
});

await graph(`/sites/${siteId}/lists/${transactionsId}/items`,"POST",{
fields:{
card_id:card,
amount:p.fields.price,
type:"charge",
timestamp:new Date().toISOString()
}
});

loadDashboard();
loadCards();
}

// ✅ AUFLADEN
async function topup(){

let card=document.getElementById("card").value;
let amount=parseFloat(document.getElementById("amount").value);

let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);
let c=res.value.find(x=>x.fields.Title===card);

if(!c){
    await graph(`/sites/${siteId}/lists/${cardsId}/items`,"POST",{fields:{Title:card,balance:amount}});
} else {
    await graph(`/sites/${siteId}/lists/${cardsId}/items/${c.id}/fields`,"PATCH",{balance:c.fields.balance+amount});
}

loadCards();
}

// ✅ DASHBOARD
async function loadDashboard(){

let d=document.getElementById("date").value;

let res=await graph(`/sites/${siteId}/lists/${transactionsId}/items?expand=fields`);

let sum=0;

res.value.forEach(x=>{
if(x.fields.timestamp?.slice(0,10)===d){
sum+=x.fields.amount;
}
});

document.getElementById("sum").innerText=sum+" €";

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{labels:["Umsatz"],datasets:[{data:[sum],backgroundColor:"#7edc8a"}]}
});
}

// ✅ KARTEN
async function loadCards(){

let res=await graph(`/sites/${siteId}/lists/${cardsId}/items?expand=fields`);

cards.innerHTML=res.value.map(c=>c.fields.Title+" → "+c.fields.balance+" €").join("<br>");
}

// ✅ DETAILS
async function showDetails(){

let card=document.getElementById("card").value;

let res=await graph(`/sites/${siteId}/lists/${transactionsId}/items?expand=fields`);

details.innerHTML=res.value
.filter(x=>x.fields.card_id===card)
.map(x=>x.fields.timestamp+" "+x.fields.amount+" €")
.join("<br>");
}

// ✅ ADMIN TOGGLE
function toggleAdmin(){
document.getElementById("admin").classList.remove("hidden");
document.getElementById("dashboardBox").classList.remove("hidden");
document.getElementById("cardsBox").classList.remove("hidden");
}

// Dummy Funktionen
function refund(){ alert("Rückgabe funktioniert"); }

init();

</script>

</body>
</html>

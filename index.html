<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vereinskasse</title>

<script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px;}
.section { background:white; padding:15px; margin:15px 0; border-radius:12px;}

button {
    padding:12px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#7edc8a;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
button:hover { background:#5ccf74; }

.adminBtn { background:#333; }
.adminBtn:hover { background:#111; }

.cardItem {
    display:flex;
    justify-content:space-between;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    background:#fafafa;
    cursor:pointer;
    border:1px solid #ddd;
}

.hidden { display:none; }
</style>
</head>

<body>

<h1>Vereinskasse</h1>

<div class="section">
<input id="card" placeholder="Karte scannen">
</div>

<div class="section">
<h2>Produkte</h2>

<h3>🍺 Getränke</h3>
<div id="drink"></div>

<h3>🍔 Essen</h3>
<div id="food"></div>

<h3>📦 Sonstiges</h3>
<div id="other"></div>

</div>

<div class="section">
<input id="amount" placeholder="Betrag">
<button onclick="topup()">Aufladen</button>
</div>

<div class="section">
<button class="adminBtn" onclick="loginAdmin()">Admin öffnen</button>
</div>

<!-- ADMIN -->
<div id="admin" class="section hidden">

<h2>Admin</h2>

<input id="name" placeholder="Produkt">
<input id="price" placeholder="Preis">

<select id="category">
<option value="Getraenk">Getränk</option>
<option value="Essen">Essen</option>
<option value="Sonstiges">Sonstiges</option>
</select>

<br>

<button onclick="addProduct()">Produkt speichern</button>

</div>

<!-- DASHBOARD -->
<div id="dashboardBox" class="section hidden">
<h2>📊 Auswertung</h2>

Von: <input type="date" id="fromDate">
Bis: <input type="date" id="toDate">

<button onclick="loadStats()">Berechnen</button>

<p>🍺 Getränke: <span id="drinkStat">0</span></p>
<p>🍔 Essen: <span id="foodStat">0</span></p>
<p>📦 Sonstiges: <span id="otherStat">0</span></p>

</div>

<script>

const ADMIN_PASSWORD = "1234";
let adminMode = false;

// ✅ ADMIN LOGIN
function loginAdmin(){
let pw = prompt("Admin Passwort:");
if(pw === ADMIN_PASSWORD){
adminMode = true;
document.getElementById("admin").classList.remove("hidden");
document.getElementById("dashboardBox").classList.remove("hidden");
loadProducts();
}else{
alert("Falsches Passwort");
}
}

// ✅ MSAL INIT
const msalInstance = new msal.PublicClientApplication({
auth:{
clientId:"844062e7-0d5c-4852-88fc-5e9940f4ed66",
authority:"https://login.microsoftonline.com/d05e1986-9d0f-4d67-8b0d-990eb3ae4ecd",
redirectUri:window.location.href
}
});

let siteId, productsId;

async function token(){
let login = await msalInstance.loginPopup({scopes:["Sites.ReadWrite.All"]});
return login.accessToken;
}

async function graph(url,method="GET",body=null){
let t = await token();

return (await fetch("https://graph.microsoft.com/v1.0"+url,{
method,
headers:{
Authorization:"Bearer "+t,
"Content-Type":"application/json"
},
body:body?JSON.stringify(body):null
})).json();
}

// INIT
async function init(){

let t = await token();

let site = await (await fetch(
"https://graph.microsoft.com/v1.0/sites/tsc1907.sharepoint.com:/sites/Kasse",
{headers:{Authorization:"Bearer "+t}}
)).json();

siteId = site.id;

let lists = await graph(`/sites/${siteId}/lists`);
productsId = lists.value.find(l=>l.displayName==="products").id;

loadProducts();
}

// PRODUKTE
async function loadProducts(){

let res = await graph(`/sites/${siteId}/lists/${productsId}/items?expand=fields`);

["drink","food","other"].forEach(x => document.getElementById(x).innerHTML="");

res.value.forEach(p => {

let btn = document.createElement("button");
btn.innerText = p.fields.Title + " " + (p.fields.price||0) + "€";

btn.onclick = () => charge(p);

// ✅ ADMIN: bearbeiten
if(adminMode){
btn.oncontextmenu = (e)=>{
e.preventDefault();

let action = prompt("edit / delete?");

if(action==="edit"){
let newPrice = prompt("Neuer Preis:", p.fields.price);

graph(`/sites/${siteId}/lists/${productsId}/items/${p.id}/fields`,"PATCH",{
price: parseFloat(newPrice)
});

loadProducts();
}

if(action==="delete"){
fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${productsId}/items/${p.id}`,{
method:"DELETE",
headers:{Authorization:"Bearer "+(await token())}
});
loadProducts();
}

};
}

let cat = p.fields.category;

if(cat==="Getraenk") drink.appendChild(btn);
else if(cat==="Essen") food.appendChild(btn);
else other.appendChild(btn);

});
}

// PRODUKT hinzufügen
async function addProduct(){

let name=document.getElementById("name").value;
let price=parseFloat(document.getElementById("price").value);
let category=document.getElementById("category").value;

await graph(`/sites/${siteId}/lists/${productsId}/items`,"POST",{
fields:{Title:name,price:price,category:category}
});

alert("Gespeichert");
loadProducts();
}

// ✅ AUSWERTUNG ZEITRAUM
async function loadStats(){

let from = document.getElementById("fromDate").value;
let to = document.getElementById("toDate").value;

let res = await graph(`/sites/${siteId}/lists/transactions/items?expand=fields`);

let drink=0, food=0, other=0;

res.value.forEach(x => {

let d = x.fields.timestamp?.slice(0,10);

if(d>=from && d<=to){

if(x.fields.category==="Getraenk") drink++;
else if(x.fields.category==="Essen") food++;
else other++;

}

});

drinkStat.innerText = drink;
foodStat.innerText = food;
otherStat.innerText = other;

}

init();

</script>
</body>
</html>

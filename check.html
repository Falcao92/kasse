<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kartensaldo</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 40px;
  background: #f4f4f4;
}

button {
  padding: 20px;
  font-size: 20px;
  border-radius: 10px;
  border: none;
  background: #4CAF50;
  color: white;
}

#result {
  margin-top: 30px;
  font-size: 24px;
  white-space: pre-line;
}
</style>
</head>

<body>

<h1>💳 Guthaben prüfen</h1>

<button onclick="scanNFC()">📡 NFC scannen</button>

<div id="result">Bitte Karte scannen</div>

<script>

const API_URL = "https://kasse-backend-vvwu.onrender.com/api/balance";

// ✅ Scan starten
async function scanNFC(){

    try {

        if (!("NDEFReader" in window)) {
            alert("❌ NFC nicht unterstützt");
            return;
        }

        const ndef = new NDEFReader();

        await ndef.scan();

        document.getElementById("result").innerText = "📡 Scanne...";

        ndef.onreading = (event) => {

            let cardId = event.serialNumber || "unknown";

            window.lastCard = cardId;

            document.getElementById("result").innerText =
                "✅ Karte erkannt: " + cardId + "\nLade Guthaben...";

            // ✅ WICHTIG: API komplett entkoppeln
            requestAnimationFrame(() => {
                setTimeout(loadBalance, 500);
            });
        };

    } catch (err) {
        console.error(err);
        alert("❌ NFC Fehler: " + err.message);
    }
}

// ✅ stabile API Funktion mit Retry
async function loadBalance(){

    let cardId = window.lastCard;

    if(!cardId) return;

    let tries = 3;

    while(tries > 0){

        try {

            let res = await fetch(API_URL + "?id=" + encodeURIComponent(cardId), {
                method: "GET",
                cache: "no-store"   // 🔥 wichtig!
            });

            if(!res.ok){
                throw new Error("HTTP " + res.status);
            }

            let data = await res.json();

            document.getElementById("result").innerText =
                "💳 Karte: " + cardId +
                "\n\n💰 Guthaben: " + data.balance + " €";

            return;

        } catch (e) {

            console.warn("Retry...", tries, e);

            tries--;

            await new Promise(r => setTimeout(r, 1000));
        }
    }

    document.getElementById("result").innerText =
        "❌ Server nicht erreichbar";
}

</script>


</body>
</html>

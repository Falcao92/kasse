<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kartensaldo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: #f4f4f4;
}

h1 {
  font-size: 28px;
}

.info {
  margin: 20px 0;
  font-size: 18px;
}

button {
  width: 90%;
  max-width: 400px;
  padding: 25px;
  font-size: 22px;
  border-radius: 15px;
  border: none;
  background: #4CAF50;
  color: white;
  margin-top: 15px;
}

input {
  width: 90%;
  max-width: 400px;
  padding: 15px;
  font-size: 18px;
  margin-top: 20px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

#result {
  margin-top: 25px;
  font-size: 20px;
  white-space: pre-line;
}

.hint {
  margin-top: 40px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  font-size: 14px;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

</style>
</head>

<body>

<h1>💳 Guthaben prüfen</h1>

<div class="info">
👉 Wähle eine Methode:
</div>

<!-- ✅ NFC -->
<button onclick="scanNFC()">📡 NFC scannen (Android)</button>

<!-- ✅ QR -->
<button onclick="scanQR()">📷 QR-Code scannen (iPhone)</button>

<!-- ✅ MANUELL -->
<input id="manual" placeholder="Kartennummer eingeben">
<button onclick="manualCheck()">🔎 Guthaben anzeigen</button>

<div id="result">Bereit</div>

<div class="hint">
<b>ℹ️ Hinweise</b><br><br>

📡 NFC: nur Android + Chrome<br>
📱 iPhone: bitte QR-Code scannen<br><br>

NFC aktivieren:<br>
Einstellungen → Verbindungen → NFC
</div>

<script>

const API_URL = "https://kasse-backend-vvwu.onrender.com/api/balance";

//
// ✅ NFC (Android)
//
async function scanNFC(){

    if (!("NDEFReader" in window)) {
        alert("❌ NFC geht nur auf Android + Chrome");
        return;
    }

    try {

        const ndef = new NDEFReader();
        await ndef.scan();

        document.getElementById("result").innerText = "📡 Scanne...";

        ndef.onreading = (event) => {

            let id = event.serialNumber || "unknown";

            document.getElementById("result").innerText =
                "✅ Karte erkannt\nÖffne Guthaben...";

            setTimeout(() => {
                openCard(id);
            }, 300);
        };

    } catch (err) {
        alert("❌ NFC Fehler: " + err.message);
    }
}

//
// ✅ QR Scanner (funktioniert auf iPhone)
//
async function scanQR(){

    if (!navigator.mediaDevices) {
        alert("❌ Kamera nicht verfügbar");
        return;
    }

    alert("👉 Bitte Kamera verwenden (oder QR mit Kamera App scannen)");

    // Hinweis: Browser QR ist eingeschränkt → meist Kamera-App nutzen
}

//
// ✅ MANUELLE EINGABE
//
function manualCheck(){

    let id = document.getElementById("manual").value;

    if(!id){
        alert("Bitte Kartennummer eingeben");
        return;
    }

    openCard(id);
}

//
// ✅ ZENTRALE FUNKTION
//
function openCard(id){
    window.location.href = API_URL + "?id=" + encodeURIComponent(id);
}

</script>

</body>
</html>

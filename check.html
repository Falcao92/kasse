<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kartensaldo</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 40px;
  background: #f4f4f4;
}

button {
  padding: 20px;
  font-size: 20px;
  border-radius: 10px;
  border: none;
  background: #4CAF50;
  color: white;
}

#result {
  margin-top: 30px;
  font-size: 24px;
  white-space: pre-line;
}
</style>
</head>

<body>

<h1>💳 Guthaben prüfen</h1>

<button onclick="scanNFC()">📡 NFC scannen</button>

<div id="result">Bitte Karte scannen</div>

<script>

const API_URL = "https://kasse-backend-vvwu.onrender.com/api/balance";

async function scanNFC(){

    try {

        if (!("NDEFReader" in window)) {
            alert("❌ NFC nicht unterstützt");
            return;
        }

        const ndef = new NDEFReader();

        await ndef.scan();

        document.getElementById("result").innerText = "📡 Scanne...";

        ndef.onreading = async (event) => {

            let cardId = event.serialNumber || "unknown";

            document.getElementById("result").innerText =
                "✅ Karte erkannt: " + cardId + "\nLade Guthaben...";

            // ✅ Delay Fix für Android NFC
            setTimeout(async () => {

                try {

                    let res = await fetch(API_URL + "?id=" + encodeURIComponent(cardId));

                    if(!res.ok){
                        throw new Error("HTTP " + res.status);
                    }

                    let data = await res.json();

                    document.getElementById("result").innerText =
                        "💳 Karte: " + cardId +
                        "\n\n💰 Guthaben: " + data.balance + " €";

                } catch (e) {

                    console.error("API ERROR:", e);

                    document.getElementById("result").innerText =
                        "❌ Fehler beim Laden (API)";
                }

            }, 300);

        };

    } catch (err) {
        console.error(err);
        alert("❌ NFC Fehler: " + err.message);
    }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kartensaldo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: #f4f4f4;
}

/* ✅ großer Titel */
h1 {
  font-size: 28px;
}

/* ✅ große Erklärung */
.info {
  margin: 20px 0;
  font-size: 18px;
  line-height: 1.4;
}

/* ✅ großer Button */
button {
  width: 90%;
  max-width: 400px;
  padding: 25px;
  font-size: 24px;
  border-radius: 15px;
  border: none;
  background: #4CAF50;
  color: white;
  margin-top: 20px;
}

/* ✅ Statusanzeige */
#result {
  margin-top: 30px;
  font-size: 22px;
  white-space: pre-line;
}

/* ✅ Hinweis Box */
.hint {
  margin-top: 40px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  font-size: 14px;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<h1>💳 Guthaben prüfen</h1>

<div class="info">
    📱 Halte dein Handy an die Karte<br>
    und tippe auf "Scannen"
</div>

<button onclick="scanNFC()">
    📡 NFC SCANNEN
</button>

<div id="result">
    Bitte Karte scannen
</div>

<div class="hint">
    <b>ℹ️ Hinweis</b><br><br>
    ✅ Funktioniert nur mit <b>Android + Google Chrome</b><br>
    ✅ NFC muss im Handy aktiviert sein<br><br>
    📍 NFC aktivieren:<br>
    Einstellungen → Verbindungen → NFC
</div>

<script>

const API_URL = "https://kasse-backend-vvwu.onrender.com/api/balance";

async function scanNFC(){

    try {

        if (!("NDEFReader" in window)) {
            alert("❌ NFC wird nicht unterstützt.\nNutze Android + Chrome");
            return;
        }

        const ndef = new NDEFReader();

        await ndef.scan();

        document.getElementById("result").innerText = "📡 Scanne...";

        ndef.onreading = (event) => {

            let cardId = event.serialNumber || "unknown";

            document.getElementById("result").innerText =
                "✅ Karte erkannt\nÖffne Guthaben...";

            // ✅ stabile Lösung → Seite öffnen
            setTimeout(() => {
                window.location.href = API_URL + "?id=" + encodeURIComponent(cardId);
            }, 300);
        };

    } catch (err) {
        console.error(err);
        alert("❌ NFC Fehler: " + err.message);
    }
}

</script>

</body>
</html>

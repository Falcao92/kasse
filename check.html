<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kartensaldo</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 40px;
  background: #f4f4f4;
}

button {
  padding: 20px;
  font-size: 20px;
  border-radius: 10px;
  border: none;
  background: #4CAF50;
  color: white;
}

#result {
  margin-top: 30px;
  font-size: 24px;
}
</style>
</head>

<body>

<h1>💳 Guthaben prüfen</h1>

<button onclick="scanNFC()">📡 NFC scannen</button>

<div id="result">Bitte Karte scannen</div>

<script>

const API_URL = "https://kasse-backend-vwvu.onrender.com/api/balance";

async function scanNFC(){

try {

    let res = await fetch(API_URL + "?id=" + cardId);

    if(!res.ok){
        throw new Error("API nicht erreichbar");
    }

    let data = await res.json();

    document.getElementById("result").innerText =
        "💳 Karte: " + cardId + "\n\n💰 Guthaben: " + data.balance + " €";

} catch(e){

    document.getElementById("result").innerText =
        "❌ Fehler beim Laden (Server evtl. inaktiv – nochmal versuchen)";
}

</script>

</body>
</html>
